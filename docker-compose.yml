version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: foodtrip-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword123
      MYSQL_DATABASE: foodtrip
      MYSQL_USER: foodtrip
      MYSQL_PASSWORD: foodtrip
      MYSQL_INITDB_SKIP_TZINFO: "yes"
    volumes:
      - /tmp/data_d/dbs/mysql/foodtrip:/var/lib/mysql
      - ./foodtrip.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --ssl=0
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-uroot",
          "-prootpassword123",
        ]
      interval: 10s
      timeout: 20s
      retries: 5
      start_period: 60s
    networks:
      - app-network
    cap_add:
      - SYS_NICE
    cap_drop:
      - NET_RAW

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: foodtrip-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      API_VERSION: /api/v1
      TOKEN_SECRET: your-secret-key-here

      # DB config
      USE_DB: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: foodtrip
      DB_PASS: foodtrip
      DB_NAME: foodtrip

      AUTO_SETUP_DB: "true"
      ALLOW_SYNC: "false"
      SALT_ROUND: 10
      DB_LOGGING: "false"
      TZ: "UTC"
    volumes:
      - /tmp/data_d/logs/foodtrip:/app/logs
      - /tmp/data_d/public/uploads:/app/public/uploads
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:3000/api/v1/home/restaurants', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  app-network:
    external: true
