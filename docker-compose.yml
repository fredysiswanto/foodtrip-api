version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: foodtrip-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: foodtrip
      MYSQL_USER: foodtrip
      MYSQL_PASSWORD: foodtrip
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

volumes:
  mysql_data:
